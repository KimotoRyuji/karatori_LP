<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>フォトクリーニング — 写真をきれいに</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Noto+Serif+JP:wght@600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  /* デザイントークン：UIUX-Library「エディトリアル・マガジン」 */
  :root{
    --bg:#FFFFFF; --surface:#FFFFFF; --surface2:#F4F2EE;
    --text:#1A1A1A; --muted:#767066; --border:#E7E3DA;
    --primary:#1A1A1A; --primary-ink:#FFFFFF; --accent:#C0392B; --accent-ink:#FFFFFF;
    --ok:#2E7D32; --radius:3px; --shadow:0 10px 28px rgba(26,26,26,.10);
    --font:"Noto Sans JP",system-ui,-apple-system,"Segoe UI",sans-serif;
    --font-head:"Playfair Display","Noto Serif JP",serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:var(--font);line-height:1.7;-webkit-font-smoothing:antialiased;
    padding:max(16px,env(safe-area-inset-top)) 16px max(28px,env(safe-area-inset-bottom));}
  .wrap{max-width:720px;margin:0 auto;}
  header h1{font-family:var(--font-head);font-size:27px;font-weight:700;margin:4px 0 4px;letter-spacing:.01em;}
  header p{margin:0 0 16px;color:var(--muted);font-size:13px;}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:16px;box-shadow:var(--shadow);}

  .drop{display:flex;flex-direction:column;align-items:center;gap:6px;border:2px dashed var(--border);border-radius:var(--radius);padding:26px 16px;text-align:center;cursor:pointer;color:var(--muted);background:var(--surface2);}
  .drop:hover{border-color:var(--accent);}
  .drop .big{font-size:32px;} .drop .lead{font-size:15px;color:var(--text);font-weight:700;}
  input[type=file]{display:none;}
  .row{display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin-top:14px;}
  .label{font-size:13px;font-weight:700;}
  .seg{display:flex;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
  .seg button{border:none;background:var(--surface);padding:9px 14px;font-family:inherit;font-size:13px;cursor:pointer;color:var(--muted);}
  .seg button.on{background:var(--primary);color:var(--primary-ink);font-weight:700;}
  .seg button + button{border-left:1px solid var(--border);}
  .hint{font-size:12px;color:var(--muted);margin:10px 2px 0;}

  /* 写真カード */
  .pcard{padding:0;overflow:hidden;}
  .pcard .pname{font-size:12px;color:var(--muted);padding:10px 14px 8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .preview{position:relative;background:var(--surface2);display:flex;align-items:center;justify-content:center;min-height:160px;border-top:1px solid var(--border);border-bottom:1px solid var(--border);}
  .preview img{display:block;max-width:100%;max-height:60vh;}
  .preview .ph{color:var(--muted);font-size:13px;padding:40px 16px;text-align:center;}
  .preview .busy{position:absolute;top:8px;right:10px;font-size:11px;color:#fff;background:rgba(26,26,26,.72);padding:3px 9px;border-radius:999px;display:none;}
  .preview .busy.show{display:block;}

  .ctls{padding:6px 14px 4px;}
  .ctl{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);}
  .ctl:last-child{border-bottom:none;}
  .ctl .nm{flex:1;min-width:0;font-size:14px;font-weight:700;}
  .ctl .nm small{display:block;font-size:10px;color:var(--muted);font-weight:400;}
  .ctl .rst{flex:0 0 auto;font-size:11px;color:var(--muted);background:none;border:none;cursor:pointer;text-decoration:underline;font-family:inherit;}
  .stepper{display:flex;align-items:center;flex:0 0 auto;}
  .stepper button{width:40px;height:40px;border:1px solid var(--border);background:var(--surface);font-size:21px;line-height:1;cursor:pointer;color:var(--primary);font-family:inherit;}
  .stepper button:active{background:var(--surface2);}
  .stepper .val{min-width:58px;text-align:center;font-size:14px;font-weight:700;font-variant-numeric:tabular-nums;border-top:1px solid var(--border);border-bottom:1px solid var(--border);height:40px;line-height:40px;}

  .dlrow{padding:12px 14px 16px;}
  .dl{display:block;width:100%;text-align:center;border:none;border-radius:var(--radius);padding:14px;background:var(--accent);color:var(--accent-ink);font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;text-decoration:none;}
  .dl:disabled{opacity:.45;cursor:not-allowed;}
  .dlmsg{font-size:12px;color:var(--muted);margin-top:8px;text-align:center;min-height:16px;}
  .dlmsg.err{color:var(--accent);}
  footer{text-align:center;color:var(--muted);font-size:11px;margin-top:8px;}
  .editlink{font-size:12px;color:var(--muted);text-align:center;margin-top:4px;}
  .editlink a{color:var(--accent);}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>フォトクリーニング</h1>
    <p>物件のスマホ写真を自動できれいに。さらに各写真ごとに「傾き・あおり・レンズ」を −／＋ で微調整できます。</p>
  </header>

  <div class="card">
    <label class="drop" id="drop" for="file">
      <span class="big">📷</span>
      <span class="lead">写真を選ぶ（複数可）</span>
      <span style="font-size:12px;">タップしてカメラ / アルバムから選択</span>
    </label>
    <input type="file" id="file" accept="image/*" multiple />
    <div class="row">
      <span class="label">補正の強さ</span>
      <div class="seg" id="seg">
        <button type="button" data-v="conservative">控えめ</button>
        <button type="button" data-v="standard" class="on">標準</button>
        <button type="button" data-v="aggressive">しっかり</button>
      </div>
    </div>
    <p class="hint">写真を選ぶと自動で「一次補正」され、その下で1枚ずつ微調整できます。調整不要ならそのままダウンロードでOK。</p>
  </div>

  <div id="photos"></div>

  <footer>処理はこの端末からサーバーへ送られ、補正後すぐ破棄されます（保存・蓄積しません）。</footer>
  <p class="editlink"><a href="/">← カラトリ トップへ戻る</a></p>
</div>

<script>
(function(){
  // 処理エンジン（Hugging Face Spaces）のURL。画面は karatori.com、処理はここへ送る。
  var API_BASE='https://kouritsuka99-photo-cleaning.hf.space';
  var fileInput=document.getElementById('file'), seg=document.getElementById('seg'),
      photos=document.getElementById('photos');
  var preset='standard';
  var STEP={tilt:0.5, keystone:0.5, lens:0.03};
  var MIN ={tilt:-12, keystone:-6, lens:-0.30};
  var MAX ={tilt: 12, keystone: 6, lens: 0.30};
  var cards=[];

  seg.addEventListener('click', function(e){
    var b=e.target.closest('button'); if(!b) return;
    var newPreset=b.getAttribute('data-v');
    if(newPreset===preset) return;
    preset=newPreset;
    [].forEach.call(seg.querySelectorAll('button'), function(x){x.classList.toggle('on',x===b);});
    // プリセット変更 → 既存写真を一次補正やり直し（手動調整はリセット）
    cards.forEach(function(c){ reprocess(c); });
  });

  fileInput.addEventListener('change', function(){
    var files=[].slice.call(fileInput.files).filter(function(f){return f&&f.type&&f.type.indexOf('image/')===0;});
    files.forEach(addCard);
    fileInput.value='';
  });

  function fmt(k,v){ return k==='lens' ? v.toFixed(2) : v.toFixed(1)+'°'; }
  function clamp(k,v){ return Math.max(MIN[k], Math.min(MAX[k], v)); }

  // JPEG blob を縮小（プレビュー用・高速化）
  function downscale(blob, maxDim){
    return new Promise(function(resolve){
      var url=URL.createObjectURL(blob); var im=new Image();
      im.onload=function(){
        var s=Math.min(1, maxDim/Math.max(im.width,im.height));
        if(s>=1){ URL.revokeObjectURL(url); resolve(blob); return; }
        var cw=Math.round(im.width*s), ch=Math.round(im.height*s);
        var c=document.createElement('canvas'); c.width=cw; c.height=ch;
        c.getContext('2d').drawImage(im,0,0,cw,ch);
        URL.revokeObjectURL(url);
        c.toBlob(function(b){ resolve(b||blob); },'image/jpeg',0.92);
      };
      im.onerror=function(){ URL.revokeObjectURL(url); resolve(blob); };
      im.src=url;
    });
  }
  function correctAuto(file){
    var fd=new FormData(); fd.append('image',file); fd.append('preset',preset);
    return fetch(API_BASE+'/correct',{method:'POST',body:fd}).then(function(r){
      if(!r.ok){ return r.json().then(function(j){throw new Error(j.detail||('エラー '+r.status));},function(){throw new Error('エラー '+r.status);}); }
      return r.blob();
    });
  }
  function adjustGeom(blob, vals, maxdim){
    var fd=new FormData(); fd.append('image',blob,'p.jpg'); fd.append('preset',preset);
    fd.append('tilt',vals.tilt); fd.append('keystone',vals.keystone); fd.append('lens',vals.lens);
    fd.append('color','false');  // 色は一次補正済み → ジオメトリのみ
    if(maxdim) fd.append('maxdim',String(maxdim));
    return fetch(API_BASE+'/adjust',{method:'POST',body:fd}).then(function(r){
      if(!r.ok){ return r.json().then(function(j){throw new Error(j.detail||('エラー '+r.status));},function(){throw new Error('エラー '+r.status);}); }
      return r.blob();
    });
  }

  function addCard(file){
    var dom=document.createElement('div'); dom.className='card pcard';
    dom.innerHTML=
      '<div class="pname"></div>'+
      '<div class="preview"><div class="ph">一次補正中…</div><img style="display:none"><span class="busy">更新中…</span></div>'+
      '<div class="ctls">'+
        ctlRow('tilt','傾き','水平の傾き（−左 / ＋右）')+
        ctlRow('keystone','あおり','縦線のすぼまり（＋上広げ / −下広げ）')+
        ctlRow('lens','レンズ','樽型ふくらみ（実験 / −で外側を縮小）')+
      '</div>'+
      '<div class="dlrow"><button class="dl" disabled>ダウンロード</button><div class="dlmsg"></div></div>';
    dom.querySelector('.pname').textContent=file.name;
    photos.appendChild(dom);

    var card={ file:file, dom:dom, autoFull:null, preview:null,
               vals:{tilt:0,keystone:0,lens:0}, urls:[], timer:null, token:0 };
    cards.push(card);
    bindCard(card);
    process(card);
    return card;
  }
  function ctlRow(k,label,desc){
    return '<div class="ctl" data-row="'+k+'">'+
      '<div class="nm">'+label+'<small>'+desc+'</small></div>'+
      '<button class="rst" data-reset="'+k+'" type="button">0に</button>'+
      '<div class="stepper"><button type="button" data-k="'+k+'" data-d="-1">−</button>'+
      '<span class="val" data-val="'+k+'">'+(k==='lens'?'0.00':'0.0°')+'</span>'+
      '<button type="button" data-k="'+k+'" data-d="1">＋</button></div></div>';
  }

  function pushUrl(card,u){ card.urls.push(u); return u; }
  function clearUrls(card){ card.urls.forEach(function(u){URL.revokeObjectURL(u);}); card.urls=[]; }
  function imgEl(card){ return card.dom.querySelector('.preview img'); }
  function phEl(card){ return card.dom.querySelector('.preview .ph'); }
  function busyEl(card){ return card.dom.querySelector('.preview .busy'); }
  function dlBtn(card){ return card.dom.querySelector('.dl'); }
  function dlMsg(card){ return card.dom.querySelector('.dlmsg'); }

  function showImg(card,blob){
    clearUrls(card);
    var u=pushUrl(card,URL.createObjectURL(blob));
    var im=imgEl(card); im.src=u; im.style.display='block'; phEl(card).style.display='none';
  }
  function setBusy(card,b){ busyEl(card).classList.toggle('show',b); }
  function updateVals(card){
    ['tilt','keystone','lens'].forEach(function(k){
      card.dom.querySelector('[data-val="'+k+'"]').textContent=fmt(k,card.vals[k]);
    });
  }

  function process(card){
    phEl(card).style.display='block'; phEl(card).textContent='一次補正中…';
    imgEl(card).style.display='none';
    dlBtn(card).disabled=true; dlMsg(card).textContent=''; dlMsg(card).className='dlmsg';
    correctAuto(card.file).then(function(full){
      card.autoFull=full;
      return downscale(full, 1400);
    }).then(function(prev){
      card.preview=prev; showImg(card,prev);
      dlBtn(card).disabled=false;
    }).catch(function(e){
      phEl(card).style.display='block'; phEl(card).textContent='失敗: '+e.message;
    });
  }
  function reprocess(card){ card.vals={tilt:0,keystone:0,lens:0}; updateVals(card); process(card); }

  function scheduleRender(card){
    if(!card.preview) return;
    setBusy(card,true);
    if(card.timer) clearTimeout(card.timer);
    card.timer=setTimeout(function(){ doRender(card); }, 250);
  }
  function doRender(card){
    var allZero=card.vals.tilt===0&&card.vals.keystone===0&&card.vals.lens===0;
    if(allZero){ showImg(card,card.preview); setBusy(card,false); return; }
    var my=++card.token;
    adjustGeom(card.preview, card.vals, 0).then(function(b){
      if(my!==card.token) return;
      showImg(card,b); setBusy(card,false);
    }).catch(function(e){ if(my===card.token){ setBusy(card,false); dlMsg(card).textContent='プレビュー失敗: '+e.message; dlMsg(card).className='dlmsg err'; } });
  }

  function bindCard(card){
    card.dom.querySelectorAll('.stepper button').forEach(function(btn){
      btn.addEventListener('click', function(){
        if(!card.preview) return;
        var k=btn.getAttribute('data-k'), d=parseInt(btn.getAttribute('data-d'),10);
        card.vals[k]=clamp(k, +(card.vals[k]+d*STEP[k]).toFixed(2));
        updateVals(card); scheduleRender(card);
      });
    });
    card.dom.querySelectorAll('.rst').forEach(function(btn){
      btn.addEventListener('click', function(){ var k=btn.getAttribute('data-reset'); card.vals[k]=0; updateVals(card); scheduleRender(card); });
    });
    dlBtn(card).addEventListener('click', function(){ download(card); });
  }

  function triggerDownload(blob, name){
    var u=URL.createObjectURL(blob); var a=document.createElement('a');
    a.href=u; a.download=name; document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(function(){URL.revokeObjectURL(u);}, 4000);
  }
  function download(card){
    if(!card.autoFull) return;
    var base=(card.file.name||'photo').replace(/\.[^.]+$/,'');
    var allZero=card.vals.tilt===0&&card.vals.keystone===0&&card.vals.lens===0;
    if(allZero){
      triggerDownload(card.autoFull, base+'_cleaned.jpg');
      dlMsg(card).textContent='保存しました。'; dlMsg(card).className='dlmsg';
      return;
    }
    dlBtn(card).disabled=true; dlMsg(card).textContent='調整を反映して書き出し中…'; dlMsg(card).className='dlmsg';
    adjustGeom(card.autoFull, card.vals, 0).then(function(b){
      triggerDownload(b, base+'_cleaned.jpg');
      dlMsg(card).textContent='保存しました（調整あり）。'; dlBtn(card).disabled=false;
    }).catch(function(e){ dlMsg(card).textContent='保存失敗: '+e.message; dlMsg(card).className='dlmsg err'; dlBtn(card).disabled=false; });
  }
})();
</script>
</body>
</html>
