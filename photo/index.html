<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="robots" content="noindex" />
<title>フォトクリーニング</title>
<!-- /photo/ は紹介ページ(/photo/lp/)へ転送します。JSが無効でも meta refresh で移動します。 -->
<meta http-equiv="refresh" content="0; url=https://karatori.com/photo/lp/" />
<link rel="canonical" href="https://karatori.com/photo/lp/" />
<style>
  html,body{margin:0;height:100%;}
  body{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;
    font-family:"Noto Sans JP",system-ui,-apple-system,"Segoe UI",sans-serif;color:#1A1A1A;background:#FFFFFF;
    padding:24px;text-align:center;line-height:1.7;}
  .spinner{width:34px;height:34px;border:3px solid #E7E3DA;border-top-color:#C0392B;border-radius:50%;
    animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  p{margin:0;color:#767066;font-size:14px;}
  a{color:#C0392B;font-weight:700;text-decoration:none;}
</style>
</head>
<body>
  <div class="spinner" aria-hidden="true"></div>
  <p>ページを移動しています…</p>
  <p>自動で切り替わらない場合は <a href="https://karatori.com/photo/lp/">こちらをタップ</a></p>
  <script>
    // 履歴に残さず即移動（戻るボタンでループしないように replace を使用）
    location.replace("https://karatori.com/photo/lp/");
  </script>
</body>
</html>
