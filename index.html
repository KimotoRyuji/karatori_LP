<!-- COMPARE -->
<section id="compare" style="background:var(--white);padding:80px 2rem 80px">
  <div class="container">
    <div class="text-center">
      <p class="section-label">COMPARISON</p>
      <h2 class="section-title">カラトリが選ばれる理由</h2>
      <div class="divider center"></div>
    </div>

    <div style="overflow-x:auto;max-width:800px;margin:0 auto">
      <table style="width:100%;border-collapse:collapse;font-size:14px;text-align:center">
        <thead>
          <tr>
            <th style="background:var(--navy);color:var(--white);padding:14px 16px;text-align:left;border-right:1px solid rgba(255,255,255,0.1)">
              比較項目
            </th>

            <th style="background:var(--navy);color:rgba(255,255,255,0.55);padding:14px 12px;border-right:1px solid rgba(255,255,255,0.1)">
              自社スマホ撮影
            </th>

            <th style="background:var(--navy);color:rgba(255,255,255,0.55);padding:14px 12px;border-right:1px solid rgba(255,255,255,0.1)">
              一般<br>カメラマン
            </th>

            <th style="background:var(--gold);color:var(--navy);padding:14px 12px;font-weight:900">
              カラトリ
            </th>
          </tr>
        </thead>

        <tbody>
          <tr style="background:var(--white)">
            <td style="padding:12px 16px;text-align:left;font-weight:700;color:var(--navy);border-bottom:1px solid var(--gray-200)">ルームツアー動画</td>
            <td style="padding:12px;border-bottom:1px solid var(--gray-200)">×</td>
            <td style="padding:12px;border-bottom:1px solid var(--gray-200)">△</td>
            <td style="padding:12px;border-bottom:1px solid var(--gray-200);font-weight:900;color:var(--gold-dim)">★</td>
          </tr>

          <tr style="background:var(--gray-100)">
            <td style="padding:12px 16px;text-align:left;font-weight:700;color:var(--navy);border-bottom:1px solid var(--gray-200)">バーチャルステージング</td>
            <td style="padding:12px;border-bottom:1px solid var(--gray-200)">×</td>
            <td style="padding:12px;border-bottom:1px solid var(--gray-200)">△</td>
            <td style="padding:12px;border-bottom:1px solid var(--gray-200);font-weight:900;color:var(--gold-dim)">★</td>
          </tr>

          <tr style="background:var(--white)">
            <td style="padding:12px 16px;text-align:left;font-weight:700;color:var(--navy);border-bottom:1px solid var(--gray-200)">駅からの導線動画</td>
            <td style="padding:12px;border-bottom:1px solid var(--gray-200)">×</td>
            <td style="padding:12px;border-bottom:1px solid var(--gray-200)">×</td>
            <td style="padding:12px;border-bottom:1px solid var(--gray-200);font-weight:900;color:var(--gold-dim)">★</td>
          </tr>

          <tr style="background:var(--gray-100)">
            <td style="padding:12px 16px;text-align:left;font-weight:700;color:var(--navy);border-bottom:1px solid var(--gray-200)">写真品質</td>
            <td style="padding:12px;border-bottom:1px solid var(--gray-200)">△</td>
            <td style="padding:12px;border-bottom:1px solid var(--gray-200)">○</td>
            <td style="padding:12px;border-bottom:1px solid var(--gray-200);font-weight:900">○</td>
          </tr>

          <tr style="background:var(--white)">
            <td style="padding:12px 16px;text-align:left;font-weight:700;color:var(--navy);border-bottom:1px solid var(--gray-200)">最短翌日納品</td>
            <td style="padding:12px;border-bottom:1px solid var(--gray-200)">×</td>
            <td style="padding:12px;border-bottom:1px solid var(--gray-200)">△</td>
            <td style="padding:12px;border-bottom:1px solid var(--gray-200);font-weight:900">○</td>
          </tr>

          <tr style="background:var(--gray-100)">
            <td style="padding:12px 16px;text-align:left;font-weight:700;color:var(--navy);border-bottom:1px solid var(--gray-200)">立ち合い不要</td>
            <td style="padding:12px;border-bottom:1px solid var(--gray-200)">△</td>
            <td style="padding:12px;border-bottom:1px solid var(--gray-200)">△</td>
            <td style="padding:12px;border-bottom:1px solid var(--gray-200);font-weight:900">○</td>
          </tr>

          <tr style="background:var(--white)">
            <td style="padding:12px 16px;text-align:left;font-weight:700;color:var(--navy)">通電不要</td>
            <td style="padding:12px">△</td>
            <td style="padding:12px">×</td>
            <td style="padding:12px;font-weight:900">○</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</section>
